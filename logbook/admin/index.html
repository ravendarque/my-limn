<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook Admin</title>
  <link rel="stylesheet" href="../../limn-engine.css">
  <style>
    :root {
      --grade-easy: #94a3b8;
      --grade-6a:   #22d3ee;
      --grade-6b:   #4ade80;
      --grade-6c:   #a3e635;
      --grade-7a:   #facc15;
      --grade-7b:   #fb923c;
      --grade-7c:   #f87171;
      --grade-8a:   #c084fc;
      --r: 8px;
    }
    body[data-corners="sharp"] { --r: 0px; }

    body {
      background: var(--color-bg); color: var(--color-text);
      padding: 1.25rem 1rem 5rem; max-width: 520px; margin: 0 auto;
    }

    a.back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--color-accent); text-decoration: none;
      font-size: .9rem; margin-bottom: 1.25rem; display: block;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--color-accent); margin-bottom: 1.5rem; }

    /* ── Key bar ───────────────────────────────────────────────────────── */
    .key-bar {
      display: flex; align-items: center; gap: .6rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r);
      padding: .55rem .85rem;
      margin-bottom: 1.5rem;
    }
    .key-bar label { font-size: .8rem; color: var(--color-text-muted); white-space: nowrap; margin: 0; }
    .key-bar input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--color-text); font-family: monospace; font-size: .95rem;
      min-width: 0;
    }

    /* ── Section labels ────────────────────────────────────────────────── */
    .section-label {
      font-size: .72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: var(--color-text-muted);
      margin: 1.25rem 0 .5rem;
    }
    .sub-label {
      font-size: .72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: var(--color-text-muted);
      margin-bottom: .5rem;
    }

    /* ── Text inputs ───────────────────────────────────────────────────── */
    .field { margin-bottom: .75rem; }
    .row { display: flex; gap: .6rem; }
    .row .field { flex: 1; min-width: 0; }

    input[type="text"], input[type="url"] {
      width: 100%; box-sizing: border-box;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r);
      padding: .65rem .85rem;
      color: var(--color-text);
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus, input[type="url"]:focus { border-color: var(--color-accent); }

    textarea {
      width: 100%; box-sizing: border-box;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r);
      padding: .65rem .85rem;
      color: var(--color-text);
      font-size: 1rem;
      outline: none; resize: vertical; min-height: 72px;
    }
    textarea:focus { border-color: var(--color-accent); }

    /* ── Segmented toggle bar (type, status) ────────────────────────────── */
    .toggle-bar {
      display: flex; flex-wrap: wrap;
      border: 1px solid var(--color-border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: .75rem;
    }
    .toggle-btn {
      flex: 1 0 auto;
      border: none;
      border-right: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      font-size: .85rem; font-weight: 600;
      padding: .55rem .7rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s;
    }
    .toggle-btn:last-child { border-right: none; }
    .toggle-btn:hover { color: var(--color-text); }
    .toggle-btn.active {
      background: var(--color-accent);
      color: var(--color-accent-text);
    }

    /* ── Type toggle: equal-width buttons ────────────────────────────────── */
    #type-group .toggle-btn {
      flex: 1 1 0;
      min-width: 4.5rem;
      text-align: center;
    }

    /* ── Status toggle: square icon-over-label buttons, equal width ──────── */
    #status-group { flex-wrap: nowrap; }
    #status-group .toggle-btn {
      flex: 1 1 0;
      aspect-ratio: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: .3rem;
      padding: .5rem .2rem;
    }
    .status-icon { font-size: 1.5rem; line-height: 1; }
    .status-label {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .03em;
    }

    /* ── Grade picker ──────────────────────────────────────────────────── */
    .grade-row {
      display: flex; align-items: stretch; gap: .6rem; margin-bottom: .75rem;
    }
    .grade-picker {
      display: flex; align-items: stretch; gap: .5rem;
    }
    .grade-step {
      flex: 0 0 2.75rem;
      border: 1px solid var(--color-border);
      border-radius: var(--r);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 1.3rem; line-height: 1;
      cursor: pointer;
    }
    .grade-step:hover { border-color: var(--color-accent); }
    .grade-step:active { transform: scale(.94); }

    #type-group { margin-bottom: 0; }

    #grade-select {
      box-sizing: border-box;
      width: 6.5rem;
      border: 1px solid currentColor;
      border-radius: var(--r);
      background: color-mix(in srgb, currentColor 25%, var(--color-surface));
      color: var(--color-text);
      font-size: 1.1rem; font-weight: 700; font-family: monospace;
      text-align: center; text-align-last: center;
      padding: .55rem .5rem;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    #grade-select option {
      font-family: monospace; font-weight: 700;
      background: var(--color-surface); color: var(--color-text);
    }

    /* ── Date input hint ───────────────────────────────────────────────── */
    .date-hint { font-size: .75rem; color: var(--color-text-muted); margin-top: .3rem; }

    /* ── Submit ────────────────────────────────────────────────────────── */
    .submit-btn {
      width: 100%; margin-top: 1.25rem;
      background: var(--color-accent); color: var(--color-accent-text);
      border: none; border-radius: var(--r);
      padding: .9rem; font-size: 1rem; font-weight: 700;
      cursor: pointer;
    }
    .submit-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Message ───────────────────────────────────────────────────────── */
    .msg {
      margin-top: .85rem; padding: .75rem 1rem;
      border-radius: var(--r); font-size: .9rem; display: none;
    }
    .msg.success {
      background: color-mix(in srgb, #4ade80 12%, var(--color-surface));
      border: 1px solid color-mix(in srgb, #4ade80 40%, transparent);
      display: block;
    }
    .msg.error {
      background: color-mix(in srgb, #f87171 12%, var(--color-surface));
      border: 1px solid color-mix(in srgb, #f87171 40%, transparent);
      display: block;
    }
  </style>
</head>
<body>
  <a href="/logbook" class="back-link">← Logbook</a>
  <h1>Add entry</h1>

  <div class="key-bar">
    <label for="admin-key">Key</label>
    <input type="password" id="admin-key" autocomplete="current-password">
  </div>

  <form id="entry-form" autocomplete="off">

    <div class="section-label">Problem/route name</div>
    <div class="field">
      <input type="text" id="name" required>
    </div>

    <div class="row">
      <div class="field">
        <div class="sub-label">Location</div>
        <input type="text" id="place" list="places-list" required>
        <datalist id="places-list"></datalist>
      </div>
      <div class="field">
        <div class="sub-label">Area</div>
        <input type="text" id="area" list="areas-list">
        <datalist id="areas-list"></datalist>
      </div>
    </div>

    <div class="section-label">Grade</div>
    <div class="grade-row">
      <div class="grade-picker">
        <button type="button" class="grade-step" id="grade-prev" aria-label="Previous grade">‹</button>
        <select id="grade-select"></select>
        <button type="button" class="grade-step" id="grade-next" aria-label="Next grade">›</button>
      </div>
      <div class="toggle-bar" id="type-group">
        <button type="button" class="toggle-btn active" data-value="boulder">Boulder</button>
        <button type="button" class="toggle-btn" data-value="lead">Lead</button>
      </div>
    </div>

    <div class="section-label">Status</div>
    <div class="toggle-bar" id="status-group">
      <button type="button" class="toggle-btn" data-value="flash">
        <span class="status-icon">⚡</span><span class="status-label">Flash</span>
      </button>
      <button type="button" class="toggle-btn active" data-value="send">
        <span class="status-icon">✅</span><span class="status-label">Send</span>
      </button>
      <button type="button" class="toggle-btn" data-value="project">
        <span class="status-icon">🌶️</span><span class="status-label">Project</span>
      </button>
      <button type="button" class="toggle-btn" data-value="wishlist">
        <span class="status-icon">👀</span><span class="status-label">Wishlist</span>
      </button>
      <button type="button" class="toggle-btn" data-value="abandoned">
        <span class="status-icon">❌</span><span class="status-label">Abandoned</span>
      </button>
    </div>

    <div class="section-label">When</div>
    <div class="field">
      <input type="text" id="date">
      <div class="date-hint">YYYY-MM or YYYY-MM-DD</div>
    </div>

    <div class="section-label">Notes</div>
    <div class="field">
      <textarea id="notes"></textarea>
    </div>

    <div class="section-label">Video URL</div>
    <div class="field">
      <input type="url" id="video">
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">Add to logbook</button>
    <div class="msg" id="msg"></div>
  </form>

  <script type="module">
    import { applyTheme, loadTheme } from "../../limn-engine.js";
    import { load } from "https://esm.sh/js-yaml@4";

    // ── Theme ─────────────────────────────────────────────────────────────
    try {
      const r = await fetch("../../config.yaml");
      if (r.ok) {
        const cfg   = load(await r.text());
        const theme = await loadTheme(cfg.theme, "../../");
        applyTheme(theme);
      }
    } catch {}

    // ── Grade data ────────────────────────────────────────────────────────
    const BOULDER_GRADES = [
      { g: "5+",  v: "V0",  c: "var(--grade-easy)" },
      { g: "5A",  v: "V0",  c: "var(--grade-easy)" },
      { g: "5B",  v: "V1",  c: "var(--grade-easy)" },
      { g: "5C",  v: "V2",  c: "var(--grade-easy)" },
      { g: "6A",  v: "V3",  c: "var(--grade-6a)"   },
      { g: "6A+", v: "V3",  c: "var(--grade-6a)"   },
      { g: "6B",  v: "V4",  c: "var(--grade-6b)"   },
      { g: "6B+", v: "V4",  c: "var(--grade-6b)"   },
      { g: "6C",  v: "V5",  c: "var(--grade-6c)"   },
      { g: "6C+", v: "V5",  c: "var(--grade-6c)"   },
      { g: "7A",  v: "V6",  c: "var(--grade-7a)"   },
      { g: "7A+", v: "V7",  c: "var(--grade-7a)"   },
      { g: "7B",  v: "V8",  c: "var(--grade-7b)"   },
      { g: "7B+", v: "V8",  c: "var(--grade-7b)"   },
      { g: "7C",  v: "V9",  c: "var(--grade-7c)"   },
      { g: "7C+", v: "V10", c: "var(--grade-7c)"   },
      { g: "8A",  v: "V11", c: "var(--grade-8a)"   },
      { g: "8A+", v: "V12", c: "var(--grade-8a)"   },
      { g: "8B",  v: "V13", c: "var(--grade-8a)"   },
      { g: "8B+", v: "V14", c: "var(--grade-8a)"   },
    ];
    const LEAD_GRADES = [
      { g: "5c",  c: "var(--grade-easy)" },
      { g: "6a",  c: "var(--grade-6a)"   },
      { g: "6a+", c: "var(--grade-6a)"   },
      { g: "6b",  c: "var(--grade-6b)"   },
      { g: "6b+", c: "var(--grade-6b)"   },
      { g: "6c",  c: "var(--grade-6c)"   },
      { g: "6c+", c: "var(--grade-6c)"   },
      { g: "7a",  c: "var(--grade-7a)"   },
      { g: "7a+", c: "var(--grade-7a)"   },
      { g: "7b",  c: "var(--grade-7b)"   },
      { g: "7b+", c: "var(--grade-7b)"   },
      { g: "7c",  c: "var(--grade-7c)"   },
      { g: "7c+", c: "var(--grade-7c)"   },
      { g: "8a",  c: "var(--grade-8a)"   },
    ];

    // ── State ─────────────────────────────────────────────────────────────
    let selectedType   = "boulder";
    let selectedStatus = "send";
    let selectedGrade  = "";
    let isFlash        = false;
    let logbookData    = [];

    // ── DOM refs ──────────────────────────────────────────────────────────
    const keyInput   = document.getElementById("admin-key");
    const placeInput = document.getElementById("place");
    const areaInput  = document.getElementById("area");
    const gradeSelect = document.getElementById("grade-select");
    const gradePrev   = document.getElementById("grade-prev");
    const gradeNext   = document.getElementById("grade-next");
    const dateInput  = document.getElementById("date");
    const submitBtn  = document.getElementById("submit-btn");
    const msgEl      = document.getElementById("msg");

    // ── Admin key (sessionStorage) ────────────────────────────────────────
    keyInput.value = sessionStorage.getItem("logbook_admin_key") ?? "";
    keyInput.addEventListener("change", () =>
      sessionStorage.setItem("logbook_admin_key", keyInput.value));

    // ── Default date ──────────────────────────────────────────────────────
    dateInput.value = new Date().toISOString().slice(0, 10);

    // ── Load logbook for place/area suggestions ───────────────────────────
    try {
      const r = await fetch("/api/logbook");
      if (r.ok) {
        const data = await r.json();
        logbookData = data.entries ?? [];
        populatePlaces();
      }
    } catch {}

    function populatePlaces() {
      const places = [...new Set(logbookData.map(e => e.place))].sort();
      const dl = document.getElementById("places-list");
      dl.innerHTML = places.map(p => `<option value="${p}">`).join("");
    }

    function populateAreas(place) {
      const areas = [...new Set(
        logbookData.filter(e => e.place === place && e.area).map(e => e.area)
      )].sort();
      const dl = document.getElementById("areas-list");
      dl.innerHTML = areas.map(a => `<option value="${a}">`).join("");
    }

    placeInput.addEventListener("input", () => populateAreas(placeInput.value.trim()));

    // ── Type toggle ───────────────────────────────────────────────────────
    document.getElementById("type-group").addEventListener("click", e => {
      const btn = e.target.closest(".toggle-btn");
      if (!btn) return;
      selectedType = btn.dataset.value;
      document.querySelectorAll("#type-group .toggle-btn").forEach(b =>
        b.classList.toggle("active", b === btn));
      renderGradeOptions();
      selectGradeByIndex(0);
    });

    // ── Grade picker (dropdown + prev/next) ────────────────────────────────
    function currentGrades() {
      return selectedType === "boulder" ? BOULDER_GRADES : LEAD_GRADES;
    }

    function renderGradeOptions() {
      const boulder = selectedType === "boulder";
      gradeSelect.innerHTML = currentGrades()
        .map(({ g, v }) => `<option value="${g}">${boulder ? `${g}/${v}` : g}</option>`)
        .join("");
    }

    function selectGradeByIndex(index) {
      const grades = currentGrades();
      const wrapped = ((index % grades.length) + grades.length) % grades.length;
      const { g, c } = grades[wrapped];
      selectedGrade = g;
      gradeSelect.value = g;
      gradeSelect.style.color = c;
    }

    function currentGradeIndex() {
      const idx = currentGrades().findIndex(({ g }) => g === selectedGrade);
      return idx === -1 ? 0 : idx;
    }

    renderGradeOptions();
    selectGradeByIndex(0);

    gradeSelect.addEventListener("change", () => selectGradeByIndex(
      currentGrades().findIndex(({ g }) => g === gradeSelect.value)
    ));
    gradePrev.addEventListener("click", () => selectGradeByIndex(currentGradeIndex() - 1));
    gradeNext.addEventListener("click", () => selectGradeByIndex(currentGradeIndex() + 1));

    // ── Status toggle (Flash is a full option: status=send, flash=true) ───
    document.getElementById("status-group").addEventListener("click", e => {
      const btn = e.target.closest(".toggle-btn");
      if (!btn) return;
      const value = btn.dataset.value;
      selectedStatus = value === "flash" ? "send" : value;
      isFlash = value === "flash";
      document.querySelectorAll("#status-group .toggle-btn").forEach(b =>
        b.classList.toggle("active", b === btn));
    });

    // ── Submit ────────────────────────────────────────────────────────────
    document.getElementById("entry-form").addEventListener("submit", async e => {
      e.preventDefault();

      const adminKey = keyInput.value.trim();
      if (!adminKey) return showMsg("Enter your admin key.", "error");

      submitBtn.disabled = true;
      msgEl.className = "msg";

      const entry = {
        place:  placeInput.value.trim(),
        area:   areaInput.value.trim(),
        name:   document.getElementById("name").value.trim(),
        grade:  selectedGrade,
        type:   selectedType,
        status: selectedStatus,
        flash:  isFlash,
        date:   dateInput.value.trim() || null,
        notes:  document.getElementById("notes").value.trim() || null,
        video:  document.getElementById("video").value.trim() || null,
      };

      try {
        const res  = await fetch("/api/logbook", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-Admin-Key": adminKey },
          body: JSON.stringify(entry),
        });
        const data = await res.json();
        if (!res.ok) {
          showMsg(data.error ?? `Error ${res.status}`, "error");
        } else {
          showMsg(`"${entry.name}" added (${data.entries.length} total)`, "success");
          document.getElementById("name").value    = "";
          document.getElementById("notes").value   = "";
          document.getElementById("video").value   = "";
          selectGradeByIndex(0);
        }
      } catch (err) {
        showMsg(`Network error: ${err.message}`, "error");
      }

      submitBtn.disabled = false;
    });

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className   = `msg ${type}`;
    }
  </script>
</body>
</html>
